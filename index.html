FFD.forEach(function(t,i){h+='<tr><td style="text-align:center;font-weight:700;color:'+(i<4?'#818cf8':'#94a3b8')+'">'+(i+1)+'</td><td style="font-weight:600">'+t.name+'</td><td style="text-align:center;color:'+(t.efg>55?'#4ade80':'#e2e8f0')+'">'+t.efg+'</td><td style="text-align:center;color:'+(t.tov<12?'#4ade80':t.tov>16?'#f87171':'#e2e8f0')+'">'+t.tov+'</td><td style="text-align:center;color:'+(t.orb>32?'#4ade80':'#e2e8f0')+'">'+t.orb+'</td><td style="text-align:center">'+t.ftr+'</td><td style="text-align:center;color:'+(t.opp_efg<46?'#4ade80':t.opp_efg>50?'#f87171':'#e2e8f0')+'">'+t.opp_efg+'</td><td style="text-align:center;color:'+(t.ppp_off>1.15?'#4ade80':'#e2e8f0')+'">'+t.ppp_off+'</td><td style="text-align:center;color:'+(t.ppp_def<0.97?'#4ade80':t.ppp_def>1.05?'#f87171':'#e2e8f0')+'">'+t.ppp_def+'</td></tr>'});
h+='</tbody></table></div></div>'}
// Seed Comparison
if(SDC.length>0){var over=SDC.filter(function(s){return s.diff<=-2});var under=SDC.filter(function(s){return s.diff>=2});h+='<div class="pt" style="margin-top:12px"><h3>🏷️ Seed vs SOR — Over/Under Seeded</h3>';
if(over.length>0){h+='<div style="margin-bottom:12px"><div style="font-size:11px;color:#4ade80;font-weight:700;margin-bottom:6px">OVERSEEDED (actual seed better than SOR says)</div>';
over.sort(function(a,b){return a.diff-b.diff});over.forEach(function(s){h+='<div style="display:grid;grid-template-columns:160px 60px 60px 60px;gap:8px;padding:3px 0;font-size:12px;border-bottom:1px solid #1e293b"><span style="font-weight:600">'+s.name+'</span><span style="text-align:center">'+s.actual+'</span><span style="text-align:center;color:#64748b">'+s.sor+'</span><span style="text-align:center;color:#4ade80;font-weight:700">'+s.diff+'</span></div>'});h+='</div>'}
if(under.length>0){h+='<div><div style="font-size:11px;color:#f87171;font-weight:700;margin-bottom:6px">UNDERSEEDED (actual seed worse than SOR says)</div>';
under.sort(function(a,b){return b.diff-a.diff});under.forEach(function(s){h+='<div style="display:grid;grid-template-columns:160px 60px 60px 60px;gap:8px;padding:3px 0;font-size:12px;border-bottom:1px solid #1e293b"><span style="font-weight:600">'+s.name+'</span><span style="text-align:center">'+s.actual+'</span><span style="text-align:center;color:#64748b">'+s.sor+'</span><span style="text-align:center;color:#f87171;font-weight:700">+'+s.diff+'</span></div>'});h+='</div>'}
h+='<div style="margin-top:8px;display:grid;grid-template-columns:160px 60px 60px 60px;gap:8px;font-size:10px;color:#475569"><span></span><span style="text-align:center">Actual</span><span style="text-align:center">SOR</span><span style="text-align:center">+/-</span></div></div>'}
// Hot/Cold Bracket Teams
if(MOM.length>0){var hot=MOM.filter(function(m){return m.trend>=3&&m.streak>=0});var cold=MOM.filter(function(m){return m.trend<=-3&&m.streak<=0});
if(hot.length>0||cold.length>0){h+='<div class="pt" style="margin-top:12px"><h3>🌡️ Bracket Team Momentum (SOR-weighted)</h3><div style="font-size:10px;color:#475569;margin-bottom:8px">Trend = quality-adjusted margin shift (last 5 vs last 10). Wins vs top-100 count more.</div>';
if(hot.length>0){h+='<div style="margin-bottom:12px"><div style="font-size:11px;color:#4ade80;font-weight:700;margin-bottom:6px">🔥 HOT</div>';
hot.sort(function(a,b){return b.trend-a.trend});hot.forEach(function(m){var streakStr=m.streak>0?'W'+m.streak:m.streak<0?'L'+Math.abs(m.streak):'';h+='<div style="display:grid;grid-template-columns:30px 140px 60px 70px 50px 50px;gap:8px;padding:3px 0;font-size:12px;border-bottom:1px solid #1e293b;align-items:center"><span style="text-align:center;color:#475569;font-size:10px">'+m.seed+'</span><span style="font-weight:600">'+m.name+'</span><span style="text-align:center;color:#4ade80;font-weight:700">'+m.trend.toFixed(1)+'</span><span style="text-align:center;font-size:11px;letter-spacing:1px">'+m.last5+'</span><span style="text-align:center;color:'+(m.streak>0?'#4ade80':'#f87171')+'">'+streakStr+'</span><span style="text-align:center;color:'+(m.qw>=2?'#fbbf24':'#475569')+';font-size:10px">'+(m.qw>0?m.qw+'QW':'')+'</span></div>'});h+='</div>'}
if(cold.length>0){h+='<div><div style="font-size:11px;color:#f87171;font-weight:700;margin-bottom:6px">❄️ COLD</div>';
cold.sort(function(a,b){return a.trend-b.trend});cold.forEach(function(m){var streakStr=m.streak>0?'W'+m.streak:m.streak<0?'L'+Math.abs(m.streak):'';h+='<div style="display:grid;grid-template-columns:30px 140px 60px 70px 50px 50px;gap:8px;padding:3px 0;font-size:12px;border-bottom:1px solid #1e293b;align-items:center"><span style="text-align:center;color:#475569;font-size:10px">'+m.seed+'</span><span style="font-weight:600">'+m.name+'</span><span style="text-align:center;color:#f87171;font-weight:700">'+m.trend.toFixed(1)+'</span><span style="text-align:center;font-size:11px;letter-spacing:1px">'+m.last5+'</span><span style="text-align:center;color:'+(m.streak>0?'#4ade80':'#f87171')+'">'+streakStr+'</span><span style="text-align:center;color:#475569;font-size:10px">'+(m.qw>0?m.qw+'QW':'')+'</span></div>'});h+='</div>'}
h+='<div style="margin-top:8px;display:grid;grid-template-columns:30px 140px 60px 70px 50px 50px;gap:8px;font-size:10px;color:#475569"><span></span><span></span><span style="text-align:center">Trend</span><span style="text-align:center">Last 5</span><span style="text-align:center">Streak</span><span style="text-align:center">QualW</span></div></div>'}}
el.innerHTML=h}

// EV tab
function rev(){var el=document.getElementById("t-ev");if(!bd||!bd.ev_bets||!bd.ev_bets.length){el.innerHTML='<p style="color:#94a3b8">No EV bets. Run: <code style="color:#4ade80">python ncaab_pipeline_v2.py</code></p>';return}
el.innerHTML='<div style="font-size:12px;color:#94a3b8;margin-bottom:14px">'+bd.ev_bets.length+' +EV bets \u2014 '+bd.date+'</div>'+bd.ev_bets.slice(0,30).map(function(b){var e=b.ev_pct>=6?'hot':b.ev_pct>=4?'warm':'cool';var o=b.odds>0?'+'+b.odds:''+b.odds;var ed=((b.model_prob-b.implied)*100).toFixed(1);return'<div class="bt '+e+'"><div><div class="lb">'+b.type+' \u2022 '+b.book+'</div><div class="si">'+b.side+'</div><div class="gn">'+b.game+'</div><div class="dt">Pred: '+b.pred+' \u2022 Spread: '+(b.model_spread>0?'+':'')+b.model_spread+(b.model_total?' \u2022 Total: '+b.model_total:'')+'</div></div><div style="text-align:center"><div class="od">'+o+'</div>'+(b.line!=null?'<div class="li">Line: '+(b.line>0?'+':'')+b.line+'</div>':'')+'<span class="eb e'+e[0]+'">\u002B'+b.ev_pct+'% EV</span></div><div><div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:2px"><span>Probability</span><span style="color:#4ade80">Edge: +'+ed+'%</span></div><div class="pb"><div class="pi" style="width:'+b.implied*100+'%"></div><div class="pm" style="width:'+b.model_prob*100+'%"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-top:1px"><span>Model: '+(b.model_prob*100).toFixed(0)+'%</span><span>Market: '+(b.implied*100).toFixed(0)+'%</span></div></div></div>'}).join('')}

// Rankings tab
var rkReg='ALL';
function rrk(){var T=BRK.length>0?BRK.map(function(t,i){return{rk:t.rank||i+1,nm:t.name,cf:t.conf||'',rc:t.record,sr:t.sor,ss:t.sos||0,po:t.ppp_off,pd:t.ppp_def,q:t.qual,efg:t.efg_pct||0,tov:t.tov_pct||0,sd:t.seed||0,reg:t.region||''}}):(bd&&bd.top_25?bd.top_25.map(function(t,i){return{rk:t.rank||i+1,nm:t.name,cf:t.conf||'',rc:t.record,sr:t.sor,ss:t.sos||0,po:t.ppp_off,pd:t.ppp_def,q:t.qual,efg:t.efg_pct||0,tov:t.tov_pct||0,sd:t.seed||0,reg:t.region||''}}):[]);
// Filter by region
var F=T;if(rkReg!=='ALL'){F=T.filter(function(t){return t.reg===rkReg})}
var s=F.slice().sort(function(a,b){var av=a[sc],bv=b[sc];return typeof av==='number'?(av-bv)*sd:String(av||'').localeCompare(String(bv||''))*sd});
var cols=[{k:'sd',l:'SEED'},{k:'nm',l:'TEAM'},{k:'reg',l:'REG'},{k:'cf',l:'CONF'},{k:'rc',l:'REC'},{k:'sr',l:'SOR'},{k:'ss',l:'SOS'},{k:'po',l:'PPP\u2191'},{k:'pd',l:'PPP\u2193'},{k:'efg',l:'eFG%'},{k:'tov',l:'TOV%'},{k:'q',l:'QUAL'}];
var regBtns=['ALL','EAST','SOUTH','MIDWEST','WEST'].map(function(r){return'<button class="rb '+(r===rkReg?'on':'')+'" style="color:'+(r===rkReg?'#f8fafc':(RC[r]||'#94a3b8'))+';'+(r===rkReg?'background:'+(RC[r]||'#475569')+';':'')+'border-color:'+(RC[r]||'#334155')+'" onclick="rkReg=\''+r+'\';rrk()">'+r+'</button>'}).join('');
document.getElementById("t-rankings").innerHTML='<div class="rgs" style="margin-bottom:10px">'+regBtns+'</div><div style="overflow-x:auto"><table><thead><tr>'+cols.map(function(c){return'<th class="'+(sc===c.k?'sr':'')+'" style="text-align:'+(c.k==='nm'?'left':'center')+'" onclick="sc=\''+c.k+'\';sd=sc===\''+c.k+'\'?-sd:1;rrk()">'+c.l+(sc===c.k?(sd===1?' \u25B2':' \u25BC'):'')+'</th>'}).join('')+'</tr></thead><tbody>'+s.map(function(t){var seedColor=t.sd<=4?'#818cf8':t.sd<=8?'#4ade80':t.sd<=12?'#fbbf24':'#94a3b8';return'<tr><td style="text-align:center;font-weight:800;color:'+seedColor+'">'+(t.sd||'')+'</td><td style="font-weight:600">'+t.nm+'</td><td style="text-align:center;color:'+(RC[t.reg]||'#64748b')+';font-size:10px;font-weight:700">'+(t.reg||'')+'</td><td style="text-align:center;color:#64748b;font-size:10px">'+t.cf+'</td><td style="text-align:center">'+t.rc+'</td><td style="text-align:center;font-weight:700;color:'+(t.sr>=.7?'#4ade80':t.sr>=.6?'#fbbf24':'#94a3b8')+'">'+(t.sr?t.sr.toFixed(3):'')+'</td><td style="text-align:center">'+t.ss+'</td><td style="text-align:center;color:'+(t.po>=1.2?'#4ade80':'#e2e8f0')+'">'+t.po.toFixed(3)+'</td><td style="text-align:center;color:'+(t.pd<=.97?'#4ade80':t.pd>=1.05?'#f87171':'#e2e8f0')+'">'+t.pd.toFixed(3)+'</td><td style="text-align:center;color:'+(t.efg>55?'#4ade80':'#e2e8f0')+'">'+(t.efg?t.efg.toFixed(1):'')+'</td><td style="text-align:center;color:'+(t.tov<12?'#4ade80':t.tov>16?'#f87171':'#e2e8f0')+'">'+(t.tov?t.tov.toFixed(1):'')+'</td><td style="text-align:center">'+t.q+'</td></tr>'}).join('')+'</tbody></table></div>'}

// Model tab
document.getElementById("t-model").innerHTML='<div class="tc"><div class="pt"><h3>Model Architecture (v2)</h3><div style="font-size:12px;line-height:1.8;color:#94a3b8"><div style="color:#818cf8;font-weight:700;margin-bottom:4px">SIDE MODEL (spreads + win prob):</div><div><span style="color:#4ade80">\u2192</span> Blend = Off_w\u00D7PPP_off(SOS) + Def_w\u00D7PPP_def(SOS)</div><div><span style="color:#4ade80">\u2192</span> SOR adj = (z_a - z_b) \u00D7 1.2 [z-score, not linear rank]</div><div><span style="color:#4ade80">\u2192</span> 4F adj = eFG\u00D70.15 + TOV\u00D7-0.10 + ORB\u00D70.08 + FTR\u00D70.05</div><div><span style="color:#4ade80">\u2192</span> Win% = 1/(1+e^(-spread/12))</div><br><div style="color:#818cf8;font-weight:700;margin-bottom:4px">TOTAL MODEL (calibrated):</div><div><span style="color:#4ade80">\u2192</span> Raw = PPP\u00D7Pace + foul(pace-aware)</div><div><span style="color:#4ade80">\u2192</span> Calibrated = Raw + 17.0 (bias correction)</div><br><div style="color:#818cf8;font-weight:700;margin-bottom:4px">BRACKET SIM:</div><div><span style="color:#4ade80">\u2192</span> Monte Carlo: random draw using win prob</div><div><span style="color:#4ade80">\u2192</span> '+NS.toLocaleString()+' iterations per run</div><div><span style="color:#4ade80">\u2192</span> Reports title%, F4%, S16%, upset frequency</div></div></div><div class="pt"><h3>v2 Parameters (Reconciled)</h3><div class="tc"><div class="sb"><div class="nn" style="color:#818cf8">0.97</div><div class="la">Off+Def Sum (Side)</div></div><div class="sb"><div class="nn" style="color:#4ade80">0.99</div><div class="la">Off+Def Sum (Total)</div></div></div><div style="margin-top:12px;font-size:11px;color:#94a3b8;line-height:1.6"><b style="color:#f8fafc">Side:</b> Off=0.49 Def=0.48 SOS\u03B1=0.11 HCA=2.5 Scale=12<br><b style="color:#f8fafc">Total:</b> Off=0.44 Def=0.55 SOS\u03B1=0.12 HCA=2.7<br><b style="color:#f8fafc">SOR:</b> z-score \u00D7 1.2 (was: rank \u00D7 0.03)<br><b style="color:#f8fafc">Foul:</b> 3.5/0.5 \u00D7 pace_factor (was: 4/1 flat)</div><br><div style="color:#f97316;font-weight:700;margin-bottom:4px">Changes from v1:</div><div style="font-size:10px;color:#94a3b8;line-height:1.6">1. SOS alpha 0\u21920.11 (was DISABLED)<br>2. HCA 1.0\u21922.5 (was way too low)<br>3. Weights 0.87\u21920.97 (base model stronger)<br>4. SOR z-score (non-linear strength)<br>5. Four Factors matchup adjustment<br>6. Separated side/total models<br>7. Total calibration (+17pt bias fix)<br>8. Monte Carlo bracket (not deterministic)</div></div></div>';

uh();rb();rmc();rev();rrk();
</script></body></html>
