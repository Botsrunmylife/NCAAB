el.innerHTML='<div style="font-size:12px;color:#94a3b8;margin-bottom:14px">'+bd.ev_bets.length+' +EV bets \u2014 '+bd.date+'</div>'+bd.ev_bets.slice(0,30).map(function(b){var e=b.ev_pct>=6?'hot':b.ev_pct>=4?'warm':'cool';var o=b.odds>0?'+'+b.odds:''+b.odds;var ed=((b.model_prob-b.implied)*100).toFixed(1);return'<div class="bt '+e+'"><div><div class="lb">'+b.type+' \u2022 '+b.book+'</div><div class="si">'+b.side+'</div><div class="gn">'+b.game+'</div><div class="dt">Pred: '+b.pred+' \u2022 Spread: '+(b.model_spread>0?'+':'')+b.model_spread+(b.model_total?' \u2022 Total: '+b.model_total:'')+'</div></div><div style="text-align:center"><div class="od">'+o+'</div>'+(b.line!=null?'<div class="li">Line: '+(b.line>0?'+':'')+b.line+'</div>':'')+'<span class="eb e'+e[0]+'">\u002B'+b.ev_pct+'% EV</span></div><div><div style="display:flex;justify-content:space-between;font-size:10px;color:#64748b;margin-bottom:2px"><span>Probability</span><span style="color:#4ade80">Edge: +'+ed+'%</span></div><div class="pb"><div class="pi" style="width:'+b.implied*100+'%"></div><div class="pm" style="width:'+b.model_prob*100+'%"></div></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-top:1px"><span>Model: '+(b.model_prob*100).toFixed(0)+'%</span><span>Market: '+(b.implied*100).toFixed(0)+'%</span></div></div></div>'}).join('')}

// Rankings tab
function rrk(){var T=bd&&bd.top_25?bd.top_25.map(function(t,i){return{rk:t.rank||i+1,nm:t.name,cf:t.conf||'',rc:t.record,sr:t.sor,ss:t.sos||0,po:t.ppp_off,pd:t.ppp_def,q:t.qual,efg:t.efg_pct||0,tov:t.tov_pct||0}}):[{rk:1,nm:"Run bot",cf:"",rc:"",sr:0,ss:0,po:0,pd:0,q:"",efg:0,tov:0}];
var s=T.slice().sort(function(a,b){var av=a[sc],bv=b[sc];return typeof av==='number'?(av-bv)*sd:String(av||'').localeCompare(String(bv||''))*sd});
var cols=[{k:'rk',l:'#'},{k:'nm',l:'TEAM'},{k:'cf',l:'CONF'},{k:'rc',l:'REC'},{k:'sr',l:'SOR'},{k:'ss',l:'SOS'},{k:'po',l:'PPP\u2191'},{k:'pd',l:'PPP\u2193'},{k:'efg',l:'eFG%'},{k:'tov',l:'TOV%'},{k:'q',l:'QUAL'}];
document.getElementById("t-rankings").innerHTML='<div style="overflow-x:auto"><table><thead><tr>'+cols.map(function(c){return'<th class="'+(sc===c.k?'sr':'')+'" style="text-align:'+(c.k==='nm'?'left':'center')+'" onclick="sc=\''+c.k+'\';sd=sc===\''+c.k+'\'?-sd:1;rrk()">'+c.l+(sc===c.k?(sd===1?' \u25B2':' \u25BC'):'')+'</th>'}).join('')+'</tr></thead><tbody>'+s.map(function(t){return'<tr><td style="text-align:center;font-weight:800;color:'+(t.rk<=4?'#818cf8':t.rk<=10?'#f8fafc':'#94a3b8')+'">'+t.rk+'</td><td style="font-weight:600">'+t.nm+'</td><td style="text-align:center;color:#64748b;font-size:10px">'+t.cf+'</td><td style="text-align:center">'+t.rc+'</td><td style="text-align:center;font-weight:700;color:'+(t.sr>=.7?'#4ade80':t.sr>=.6?'#fbbf24':'#94a3b8')+'">'+t.sr.toFixed(3)+'</td><td style="text-align:center">'+t.ss+'</td><td style="text-align:center;color:'+(t.po>=1.2?'#4ade80':'#e2e8f0')+'">'+t.po.toFixed(3)+'</td><td style="text-align:center;color:'+(t.pd<=.97?'#4ade80':t.pd>=1.05?'#f87171':'#e2e8f0')+'">'+t.pd.toFixed(3)+'</td><td style="text-align:center;color:'+(t.efg>55?'#4ade80':'#e2e8f0')+'">'+(t.efg?t.efg.toFixed(1):'')+'</td><td style="text-align:center;color:'+(t.tov<12?'#4ade80':t.tov>16?'#f87171':'#e2e8f0')+'">'+(t.tov?t.tov.toFixed(1):'')+'</td><td style="text-align:center">'+t.q+'</td></tr>'}).join('')+'</tbody></table></div>'}

// Model tab
document.getElementById("t-model").innerHTML='<div class="tc"><div class="pt"><h3>Model Architecture (v2)</h3><div style="font-size:12px;line-height:1.8;color:#94a3b8"><div style="color:#818cf8;font-weight:700;margin-bottom:4px">SIDE MODEL (spreads + win prob):</div><div><span style="color:#4ade80">\u2192</span> Blend = Off_w\u00D7PPP_off(SOS) + Def_w\u00D7PPP_def(SOS)</div><div><span style="color:#4ade80">\u2192</span> SOR adj = (z_a - z_b) \u00D7 1.2 [z-score, not linear rank]</div><div><span style="color:#4ade80">\u2192</span> 4F adj = eFG\u00D70.15 + TOV\u00D7-0.10 + ORB\u00D70.08 + FTR\u00D70.05</div><div><span style="color:#4ade80">\u2192</span> Win% = 1/(1+e^(-spread/12))</div><br><div style="color:#818cf8;font-weight:700;margin-bottom:4px">TOTAL MODEL (calibrated):</div><div><span style="color:#4ade80">\u2192</span> Raw = PPP\u00D7Pace + foul(pace-aware)</div><div><span style="color:#4ade80">\u2192</span> Calibrated = Raw + 17.0 (bias correction)</div><br><div style="color:#818cf8;font-weight:700;margin-bottom:4px">BRACKET SIM:</div><div><span style="color:#4ade80">\u2192</span> Monte Carlo: random draw using win prob</div><div><span style="color:#4ade80">\u2192</span> '+NS.toLocaleString()+' iterations per run</div><div><span style="color:#4ade80">\u2192</span> Reports title%, F4%, S16%, upset frequency</div></div></div><div class="pt"><h3>v2 Parameters (Reconciled)</h3><div class="tc"><div class="sb"><div class="nn" style="color:#818cf8">0.97</div><div class="la">Off+Def Sum (Side)</div></div><div class="sb"><div class="nn" style="color:#4ade80">0.99</div><div class="la">Off+Def Sum (Total)</div></div></div><div style="margin-top:12px;font-size:11px;color:#94a3b8;line-height:1.6"><b style="color:#f8fafc">Side:</b> Off=0.49 Def=0.48 SOS\u03B1=0.11 HCA=2.5 Scale=12<br><b style="color:#f8fafc">Total:</b> Off=0.44 Def=0.55 SOS\u03B1=0.12 HCA=2.7<br><b style="color:#f8fafc">SOR:</b> z-score \u00D7 1.2 (was: rank \u00D7 0.03)<br><b style="color:#f8fafc">Foul:</b> 3.5/0.5 \u00D7 pace_factor (was: 4/1 flat)</div><br><div style="color:#f97316;font-weight:700;margin-bottom:4px">Changes from v1:</div><div style="font-size:10px;color:#94a3b8;line-height:1.6">1. SOS alpha 0\u21920.11 (was DISABLED)<br>2. HCA 1.0\u21922.5 (was way too low)<br>3. Weights 0.87\u21920.97 (base model stronger)<br>4. SOR z-score (non-linear strength)<br>5. Four Factors matchup adjustment<br>6. Separated side/total models<br>7. Total calibration (+17pt bias fix)<br>8. Monte Carlo bracket (not deterministic)</div></div></div>';

uh();rb();rmc();rev();rrk();
</script></body></html>
